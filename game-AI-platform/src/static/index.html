<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>🎮 AI 游戏创造平台</title>
  <style>
    :root {
      --bg: #0a0a1a;
      --surface: #12122a;
      --surface2: #1a1a3a;
      --border: #2a2a5a;
      --primary: #6c5ce7;
      --primary-hover: #7c6cf7;
      --success: #00e676;
      --danger: #ff5252;
      --warning: #ffd740;
      --text: #e0e0f0;
      --text-dim: #8888aa;
      --radius: 12px;
    }
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
    }

    /* ── Header ────────────────────────────────────────── */
    .header {
      background: var(--surface);
      border-bottom: 1px solid var(--border);
      padding: 16px 32px;
      display: flex;
      align-items: center;
      gap: 16px;
    }
    .header h1 { font-size: 24px; }
    .header .subtitle { color: var(--text-dim); font-size: 14px; }

    /* ── Main layout ───────────────────────────────────── */
    .container {
      max-width: 1200px;
      margin: 0 auto;
      padding: 32px 24px;
    }

    /* ── Creation form ─────────────────────────────────── */
    .create-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 32px;
      margin-bottom: 32px;
    }
    .create-card h2 {
      margin-bottom: 16px;
      font-size: 20px;
    }
    .form-row {
      display: flex;
      gap: 16px;
      margin-bottom: 16px;
    }
    .form-row textarea {
      flex: 1;
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: 8px;
      color: var(--text);
      padding: 14px 16px;
      font-size: 16px;
      resize: vertical;
      min-height: 80px;
      font-family: inherit;
    }
    .form-row textarea:focus {
      outline: none;
      border-color: var(--primary);
    }
    .form-row textarea::placeholder { color: var(--text-dim); }

    .engine-select {
      display: flex;
      gap: 12px;
    }
    .engine-btn {
      padding: 10px 20px;
      border: 2px solid var(--border);
      border-radius: 8px;
      background: var(--surface2);
      color: var(--text);
      cursor: pointer;
      font-size: 14px;
      transition: all 0.2s;
    }
    .engine-btn.active {
      border-color: var(--primary);
      background: rgba(108, 92, 231, 0.2);
    }
    .engine-btn:hover { border-color: var(--primary-hover); }

    .btn-primary {
      background: var(--primary);
      color: #fff;
      border: none;
      border-radius: 8px;
      padding: 14px 32px;
      font-size: 16px;
      font-weight: 600;
      cursor: pointer;
      transition: background 0.2s;
    }
    .btn-primary:hover { background: var(--primary-hover); }
    .btn-primary:disabled { opacity: 0.5; cursor: not-allowed; }

    .btn-sm {
      padding: 8px 16px;
      font-size: 13px;
      border-radius: 6px;
      border: 1px solid var(--border);
      background: var(--surface2);
      color: var(--text);
      cursor: pointer;
      transition: all 0.2s;
    }
    .btn-sm:hover { border-color: var(--primary); }
    .btn-danger { border-color: var(--danger); color: var(--danger); }
    .btn-success { border-color: var(--success); color: var(--success); }

    /* ── Progress ──────────────────────────────────────── */
    .progress-panel {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 24px;
      margin-bottom: 24px;
      display: none;
    }
    .progress-panel.active { display: block; }
    .progress-title {
      font-size: 18px;
      margin-bottom: 12px;
    }
    .progress-bar-wrap {
      background: var(--surface2);
      border-radius: 8px;
      height: 8px;
      margin-bottom: 12px;
      overflow: hidden;
    }
    .progress-bar {
      background: var(--primary);
      height: 100%;
      width: 0%;
      transition: width 0.4s ease;
      border-radius: 8px;
    }
    .progress-log {
      font-family: 'Fira Code', monospace, Consolas;
      font-size: 13px;
      color: var(--text-dim);
      max-height: 200px;
      overflow-y: auto;
      white-space: pre-wrap;
      padding: 12px;
      background: var(--bg);
      border-radius: 8px;
    }

    /* ── Project list ──────────────────────────────────── */
    .projects-title {
      font-size: 20px;
      margin-bottom: 16px;
    }
    .project-list { display: grid; gap: 16px; }

    .project-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 20px 24px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      transition: border-color 0.2s;
    }
    .project-card:hover { border-color: var(--primary); }

    .project-info { flex: 1; }
    .project-title { font-size: 16px; font-weight: 600; margin-bottom: 4px; }
    .project-prompt { font-size: 13px; color: var(--text-dim); margin-bottom: 8px; }
    .project-meta { font-size: 12px; color: var(--text-dim); display: flex; gap: 16px; }

    .status-badge {
      display: inline-block;
      padding: 3px 10px;
      border-radius: 12px;
      font-size: 12px;
      font-weight: 600;
      text-transform: uppercase;
    }
    .status-analyzing, .status-planning, .status-generating { background: rgba(108,92,231,0.2); color: var(--primary); }
    .status-building, .status-testing { background: rgba(255,215,64,0.2); color: var(--warning); }
    .status-fixing { background: rgba(255,152,0,0.2); color: #ff9800; }
    .status-ready { background: rgba(0,230,118,0.2); color: var(--success); }
    .status-failed { background: rgba(255,82,82,0.2); color: var(--danger); }

    .project-actions {
      display: flex;
      gap: 8px;
      align-items: center;
    }

    /* ── Preview dialog ────────────────────────────────── */
    .preview-overlay {
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.8);
      display: none;
      justify-content: center;
      align-items: center;
      z-index: 1000;
    }
    .preview-overlay.active { display: flex; }
    .preview-dialog {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      width: 90vw;
      height: 85vh;
      display: flex;
      flex-direction: column;
    }
    .preview-toolbar {
      padding: 12px 20px;
      border-bottom: 1px solid var(--border);
      display: flex;
      justify-content: space-between;
      align-items: center;
    }
    .preview-frame {
      flex: 1;
      border: none;
      background: #000;
    }

    /* ── Iterate dialog ────────────────────────────────── */
    .iterate-overlay {
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.8);
      display: none;
      justify-content: center;
      align-items: center;
      z-index: 1000;
    }
    .iterate-overlay.active { display: flex; }
    .iterate-dialog {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      width: 500px;
      padding: 32px;
    }
    .iterate-dialog h3 { margin-bottom: 16px; }
    .iterate-dialog textarea {
      width: 100%;
      min-height: 100px;
      margin-bottom: 16px;
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: 8px;
      color: var(--text);
      padding: 12px;
      font-size: 14px;
      font-family: inherit;
    }
    .iterate-actions { display: flex; gap: 12px; justify-content: flex-end; }

    /* ── Chat dialog (multi-turn) ──────────────────────── */
    .chat-overlay {
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.8);
      display: none;
      justify-content: center;
      align-items: center;
      z-index: 1000;
    }
    .chat-overlay.active { display: flex; }
    .chat-dialog {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      width: 600px;
      height: 80vh;
      display: flex;
      flex-direction: column;
    }
    .chat-header {
      padding: 16px 20px;
      border-bottom: 1px solid var(--border);
      display: flex;
      justify-content: space-between;
      align-items: center;
    }
    .chat-header h3 { font-size: 16px; }
    .chat-messages {
      flex: 1;
      overflow-y: auto;
      padding: 16px 20px;
      display: flex;
      flex-direction: column;
      gap: 12px;
    }
    .chat-msg {
      max-width: 85%;
      padding: 10px 14px;
      border-radius: 12px;
      font-size: 14px;
      line-height: 1.5;
      white-space: pre-wrap;
      word-break: break-word;
    }
    .chat-msg.user {
      align-self: flex-end;
      background: var(--primary);
      color: #fff;
      border-bottom-right-radius: 4px;
    }
    .chat-msg.assistant {
      align-self: flex-start;
      background: var(--surface2);
      color: var(--text);
      border-bottom-left-radius: 4px;
    }
    .chat-msg .changed-files {
      margin-top: 6px;
      font-size: 12px;
      color: var(--success);
    }
    .chat-msg.thinking {
      align-self: flex-start;
      background: var(--surface2);
      color: var(--text-dim);
      font-style: italic;
    }
    .chat-input-row {
      padding: 12px 16px;
      border-top: 1px solid var(--border);
      display: flex;
      gap: 8px;
    }
    .chat-input-row input {
      flex: 1;
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: 8px;
      color: var(--text);
      padding: 10px 14px;
      font-size: 14px;
      font-family: inherit;
    }
    .chat-input-row input:focus { outline: none; border-color: var(--primary); }
    .chat-input-row input::placeholder { color: var(--text-dim); }

    /* ── Plan / Log viewer dialog ──────────────────────── */
    .plan-overlay {
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.8);
      display: none;
      justify-content: center;
      align-items: center;
      z-index: 1000;
    }
    .plan-overlay.active { display: flex; }
    .plan-dialog {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      width: 860px;
      height: 85vh;
      display: flex;
      flex-direction: column;
    }
    .plan-header {
      padding: 16px 20px;
      border-bottom: 1px solid var(--border);
      display: flex;
      justify-content: space-between;
      align-items: center;
    }
    .plan-content {
      flex: 1;
      overflow-y: auto;
      padding: 20px 24px;
      font-size: 14px;
      line-height: 1.7;
      color: var(--text);
      background: var(--bg);
      margin: 12px;
      border-radius: 8px;
    }
    .plan-content h1, .plan-content h2, .plan-content h3 { color: var(--primary); margin-top: 20px; }
    .plan-content h1 { font-size: 20px; }
    .plan-content h2 { font-size: 17px; }
    .plan-content table { border-collapse: collapse; width: 100%; margin: 8px 0; }
    .plan-content th, .plan-content td { border: 1px solid var(--border); padding: 6px 10px; text-align: left; font-size: 13px; }
    .plan-content th { background: var(--surface2); }
    .plan-content code { background: var(--surface2); padding: 2px 5px; border-radius: 3px; font-size: 13px; }
    .plan-content blockquote { border-left: 3px solid var(--primary); padding-left: 12px; color: var(--text-dim); margin: 8px 0; }
    .plan-content ul { padding-left: 20px; }
    .plan-content li { margin: 3px 0; }
    .plan-content hr { border: none; border-top: 1px solid var(--border); margin: 16px 0; }
    .plan-content pre { background: var(--surface2); padding: 10px; border-radius: 6px; overflow-x: auto; }

    .log-overlay {
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.8);
      display: none;
      justify-content: center;
      align-items: center;
      z-index: 1000;
    }
    .log-overlay.active { display: flex; }
    .log-dialog {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      width: 800px;
      height: 80vh;
      display: flex;
      flex-direction: column;
    }
    .log-header {
      padding: 16px 20px;
      border-bottom: 1px solid var(--border);
      display: flex;
      justify-content: space-between;
      align-items: center;
    }
    .log-content {
      flex: 1;
      overflow-y: auto;
      padding: 16px;
      font-family: 'Fira Code', monospace, Consolas;
      font-size: 12px;
      color: var(--text-dim);
      white-space: pre-wrap;
      word-break: break-all;
      background: var(--bg);
      margin: 12px;
      border-radius: 8px;
    }

    /* ── Examples ───────────────────────────────────────── */
    .examples {
      margin-top: 12px;
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
    }
    .example-chip {
      padding: 6px 14px;
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: 20px;
      font-size: 13px;
      cursor: pointer;
      transition: all 0.2s;
    }
    .example-chip:hover {
      border-color: var(--primary);
      background: rgba(108, 92, 231, 0.15);
    }
  </style>
</head>
<body>
  <!-- Header -->
  <div class="header">
    <h1>🎮 AI 游戏创造平台</h1>
    <span class="subtitle">描述你想要的游戏，AI 自动生成 · 构建 · 测试 · 部署</span>
  </div>

  <div class="container">
    <!-- Create Game -->
    <div class="create-card">
      <h2>✨ 创建新游戏</h2>
      <div class="form-row">
        <textarea id="prompt" placeholder="描述你想要的游戏……&#10;例如：做一个太空射击游戏，玩家驾驶飞船躲避陨石并射击外星人，有3个关卡和Boss战"></textarea>
      </div>
      <div style="display:flex; justify-content:space-between; align-items:center;">
        <div class="engine-select">
          <button class="engine-btn active" data-engine="phaser2d" onclick="selectEngine(this)">🕹️ Phaser 2D</button>
          <button class="engine-btn" data-engine="threejs3d" onclick="selectEngine(this)">🎲 Three.js 3D</button>
        </div>
        <button class="btn-primary" id="createBtn" onclick="createGame()">🚀 开始创建</button>
      </div>
      <div class="examples">
        <span class="example-chip" onclick="fillExample(this)">贪吃蛇，复古像素风</span>
        <span class="example-chip" onclick="fillExample(this)">太空射击，有Boss战和升级系统</span>
        <span class="example-chip" onclick="fillExample(this)">平台跳跃游戏，收集金币闯关</span>
        <span class="example-chip" onclick="fillExample(this)">打砖块游戏，有道具掉落</span>
        <span class="example-chip" onclick="fillExample(this)">塔防游戏，3种防御塔</span>
        <span class="example-chip" onclick="fillExample(this)">Flappy Bird 克隆</span>
      </div>
    </div>

    <!-- Progress Panel -->
    <div class="progress-panel" id="progressPanel">
      <div class="progress-title" id="progressTitle">🔄 正在创建游戏…</div>
      <div class="progress-bar-wrap"><div class="progress-bar" id="progressBar"></div></div>
      <div class="progress-log" id="progressLog"></div>
    </div>

    <!-- Project List -->
    <h2 class="projects-title">📁 我的游戏</h2>
    <div class="project-list" id="projectList">
      <div style="color:var(--text-dim); text-align:center; padding:40px;">
        还没有创建过游戏，试试上面的输入框吧 ✨
      </div>
    </div>
  </div>

  <!-- Preview Dialog -->
  <div class="preview-overlay" id="previewOverlay" onclick="if(event.target===this)closePreview()">
    <div class="preview-dialog">
      <div class="preview-toolbar">
        <span id="previewTitle">游戏预览</span>
        <button class="btn-sm" onclick="closePreview()">✕ 关闭</button>
      </div>
      <iframe class="preview-frame" id="previewFrame"></iframe>
    </div>
  </div>

  <!-- Iterate Dialog (legacy single-shot) -->
  <div class="iterate-overlay" id="iterateOverlay" onclick="if(event.target===this)closeIterate()">
    <div class="iterate-dialog">
      <h3>🔄 迭代修改</h3>
      <textarea id="iterateFeedback" placeholder="描述你想要的修改……&#10;例如：加快玩家移动速度，增加一个双跳功能"></textarea>
      <div class="iterate-actions">
        <button class="btn-sm" onclick="closeIterate()">取消</button>
        <button class="btn-primary" onclick="submitIterate()" style="padding:10px 24px; font-size:14px;">提交修改</button>
      </div>
    </div>
  </div>

  <!-- Chat Dialog (multi-turn) -->
  <div class="chat-overlay" id="chatOverlay" onclick="if(event.target===this)closeChat()">
    <div class="chat-dialog">
      <div class="chat-header">
        <h3>💬 对话打磨游戏</h3>
        <button class="btn-sm" onclick="closeChat()">✕ 关闭</button>
      </div>
      <div class="chat-messages" id="chatMessages">
        <div class="chat-msg assistant">你好！我是你的游戏开发助手 🎮 描述你想要的修改，我会帮你一步步打磨游戏。</div>
      </div>
      <div class="chat-input-row">
        <input type="text" id="chatInput" placeholder="输入修改需求…例如：加个双跳功能" onkeydown="if(event.key==='Enter')sendChat()" />
        <button class="btn-primary" onclick="sendChat()" id="chatSendBtn" style="padding:10px 20px; font-size:14px;">发送</button>
      </div>
    </div>
  </div>

  <!-- Plan Viewer Dialog -->
  <div class="plan-overlay" id="planOverlay" onclick="if(event.target===this)closePlanViewer()">
    <div class="plan-dialog">
      <div class="plan-header">
        <h3>📝 游戏生成方案</h3>
        <button class="btn-sm" onclick="closePlanViewer()">✕ 关闭</button>
      </div>
      <div class="plan-content" id="planContent">加载中…</div>
    </div>
  </div>

  <!-- Log Viewer Dialog -->
  <div class="log-overlay" id="logOverlay" onclick="if(event.target===this)closeLogViewer()">
    <div class="log-dialog">
      <div class="log-header">
        <h3>📋 项目日志</h3>
        <button class="btn-sm" onclick="closeLogViewer()">✕ 关闭</button>
      </div>
      <div class="log-content" id="logContent">加载中…</div>
    </div>
  </div>

  <script>
    const API = '/api/v1';
    let selectedEngine = 'phaser2d';
    let currentIterateId = null;

    // ── Engine selector ───────────────────────────────────
    function selectEngine(btn) {
      document.querySelectorAll('.engine-btn').forEach(b => b.classList.remove('active'));
      btn.classList.add('active');
      selectedEngine = btn.dataset.engine;
    }

    function fillExample(chip) {
      document.getElementById('prompt').value = chip.textContent;
    }

    // ── Create game ───────────────────────────────────────
    async function createGame() {
      const prompt = document.getElementById('prompt').value.trim();
      if (!prompt) return;

      const btn = document.getElementById('createBtn');
      btn.disabled = true;
      btn.textContent = '⏳ 创建中…';

      showProgress();
      addLogLine('📤 提交游戏描述…');

      try {
        const res = await fetch(`${API}/games`, {
          method: 'POST',
          headers: {'Content-Type': 'application/json'},
          body: JSON.stringify({prompt, engine: selectedEngine}),
        });
        const data = await res.json();
        addLogLine(`✅ 项目已创建: ${data.id}`);
        listenEvents(data.id);
      } catch (e) {
        addLogLine(`❌ 错误: ${e.message}`);
      }
    }

    // ── SSE listener ──────────────────────────────────────
    function listenEvents(projectId) {
      const es = new EventSource(`${API}/games/${projectId}/events`);
      es.onmessage = (evt) => {
        const data = JSON.parse(evt.data);

        if (data.file) {
          addLogLine(`  📝 生成文件: ${data.file}  (${data.done}/${data.total})`);
          setProgress((data.done / data.total) * 70 + 15);
        } else if (data.status) {
          const labels = {
            analyzing: '🔍 分析游戏描述…',
            planning: '📋 规划项目结构…',
            generating: '⚙️ 生成游戏代码…',
            building: '🔨 构建项目…',
            testing: '🧪 测试运行…',
            fixing: '🔧 修复问题…',
            ready: '🎉 游戏创建完成！',
            failed: '❌ 创建失败',
          };
          addLogLine(labels[data.status] || data.status);
          const progressMap = {analyzing:10, planning:15, generating:20, building:75, testing:85, fixing:90, ready:100, failed:100};
          setProgress(progressMap[data.status] || 50);
        }

        if (data.done) {
          es.close();
          const btn = document.getElementById('createBtn');
          btn.disabled = false;
          btn.textContent = '🚀 开始创建';
          setTimeout(() => { loadProjects(); hideProgress(); }, 1500);
        }
      };
      es.onerror = () => {
        es.close();
        addLogLine('⚠️ 连接断开');
        const btn = document.getElementById('createBtn');
        btn.disabled = false;
        btn.textContent = '🚀 开始创建';
        setTimeout(loadProjects, 2000);
      };
    }

    // ── Progress panel ────────────────────────────────────
    function showProgress() {
      const panel = document.getElementById('progressPanel');
      panel.classList.add('active');
      document.getElementById('progressLog').textContent = '';
      setProgress(0);
    }
    function hideProgress() {
      document.getElementById('progressPanel').classList.remove('active');
    }
    function setProgress(pct) {
      document.getElementById('progressBar').style.width = pct + '%';
    }
    function addLogLine(text) {
      const el = document.getElementById('progressLog');
      el.textContent += text + '\n';
      el.scrollTop = el.scrollHeight;
    }

    // ── Load projects ─────────────────────────────────────
    async function loadProjects() {
      try {
        const res = await fetch(`${API}/games`);
        const projects = await res.json();
        renderProjects(projects);
      } catch (e) {
        console.error('Failed to load projects', e);
      }
    }

    function renderProjects(projects) {
      const list = document.getElementById('projectList');
      if (!projects.length) {
        list.innerHTML = '<div style="color:var(--text-dim); text-align:center; padding:40px;">还没有创建过游戏 ✨</div>';
        return;
      }
      list.innerHTML = projects.map(p => `
        <div class="project-card">
          <div class="project-info">
            <div class="project-title">${escHtml(p.prompt.slice(0, 60))}${p.prompt.length > 60 ? '…' : ''}</div>
            <div class="project-meta">
              <span class="status-badge status-${p.status}">${statusLabel(p.status)}</span>
              <span>🎮 ${p.engine === 'phaser2d' ? 'Phaser 2D' : 'Three.js 3D'}</span>
              <span>🕐 ${timeAgo(p.created_at)}</span>
            </div>
            ${p.error ? `<div class="project-prompt" style="color:var(--danger);margin-top:6px;">⚠️ ${escHtml(p.error.slice(0, 100))}</div>` : ''}
          </div>
          <div class="project-actions">
            ${p.status === 'ready' ? `
              <button class="btn-sm btn-success" onclick="previewGame('${p.id}')">▶️ 预览</button>
              <button class="btn-sm" onclick="openChat('${p.id}')">💬 对话</button>
              <button class="btn-sm" onclick="openIterate('${p.id}')">🔄 迭代</button>
            ` : ''}
            <button class="btn-sm" onclick="viewPlan('${p.id}')">📝 方案</button>
            <button class="btn-sm" onclick="viewLogs('${p.id}')">📋 日志</button>
            <button class="btn-sm btn-danger" onclick="deleteGame('${p.id}')">🗑️</button>
          </div>
        </div>
      `).join('');
    }

    // ── Preview ───────────────────────────────────────────
    async function previewGame(id) {
      try {
        const res = await fetch(`${API}/games/${id}/preview`, {method: 'POST'});
        const data = await res.json();
        document.getElementById('previewFrame').src = data.url;
        document.getElementById('previewTitle').textContent = `游戏预览 — localhost:${data.port}`;
        document.getElementById('previewOverlay').classList.add('active');
      } catch (e) {
        alert('启动预览失败: ' + e.message);
      }
    }
    function closePreview() {
      document.getElementById('previewOverlay').classList.remove('active');
      document.getElementById('previewFrame').src = '';
    }

    // ── Iterate ───────────────────────────────────────────
    function openIterate(id) {
      currentIterateId = id;
      document.getElementById('iterateFeedback').value = '';
      document.getElementById('iterateOverlay').classList.add('active');
    }
    function closeIterate() {
      document.getElementById('iterateOverlay').classList.remove('active');
      currentIterateId = null;
    }
    async function submitIterate() {
      if (!currentIterateId) return;
      const feedback = document.getElementById('iterateFeedback').value.trim();
      if (!feedback) return;
      closeIterate();
      showProgress();
      addLogLine(`🔄 提交迭代修改: ${feedback.slice(0, 80)}`);
      try {
        await fetch(`${API}/games/${currentIterateId}/iterate`, {
          method: 'POST',
          headers: {'Content-Type': 'application/json'},
          body: JSON.stringify({feedback}),
        });
        addLogLine('✅ 迭代任务已提交');
        // Poll for completion
        pollStatus(currentIterateId);
      } catch (e) {
        addLogLine(`❌ 错误: ${e.message}`);
      }
    }

    async function pollStatus(id) {
      const poll = setInterval(async () => {
        try {
          const res = await fetch(`${API}/games/${id}`);
          const data = await res.json();
          if (data.status === 'ready' || data.status === 'failed') {
            clearInterval(poll);
            addLogLine(data.status === 'ready' ? '🎉 迭代完成！' : `❌ 迭代失败: ${data.error}`);
            setTimeout(() => { loadProjects(); hideProgress(); }, 1500);
          }
        } catch (e) { clearInterval(poll); }
      }, 2000);
    }

    // ── Delete ────────────────────────────────────────────
    async function deleteGame(id) {
      if (!confirm('确定要删除这个游戏项目吗？')) return;
      await fetch(`${API}/games/${id}`, {method: 'DELETE'});
      loadProjects();
    }

    // ── Chat (multi-turn) ────────────────────────────────
    let currentChatId = null;
    let chatBusy = false;

    async function openChat(id) {
      currentChatId = id;
      chatBusy = false;
      const msgEl = document.getElementById('chatMessages');
      msgEl.innerHTML = '<div class="chat-msg assistant">你好！我是你的游戏开发助手 🎮 描述你想要的修改，我会帮你一步步打磨游戏。</div>';
      document.getElementById('chatInput').value = '';
      document.getElementById('chatSendBtn').disabled = false;
      document.getElementById('chatOverlay').classList.add('active');

      // Load existing conversation
      try {
        const res = await fetch(`${API}/games/${id}/conversation`);
        const history = await res.json();
        if (history.length > 0) {
          msgEl.innerHTML = '';
          history.forEach(m => appendChatMsg(m.role, m.content, m.changes_made));
        }
      } catch (e) { /* ignore */ }
      scrollChat();
    }

    function closeChat() {
      document.getElementById('chatOverlay').classList.remove('active');
      currentChatId = null;
    }

    function appendChatMsg(role, text, changedFiles) {
      const msgEl = document.getElementById('chatMessages');
      const div = document.createElement('div');
      div.className = `chat-msg ${role}`;
      div.textContent = text;
      if (changedFiles && changedFiles.length > 0) {
        const cf = document.createElement('div');
        cf.className = 'changed-files';
        cf.textContent = '📝 修改: ' + changedFiles.join(', ');
        div.appendChild(cf);
      }
      msgEl.appendChild(div);
      scrollChat();
      return div;
    }

    function scrollChat() {
      const msgEl = document.getElementById('chatMessages');
      msgEl.scrollTop = msgEl.scrollHeight;
    }

    async function sendChat() {
      if (!currentChatId || chatBusy) return;
      const input = document.getElementById('chatInput');
      const message = input.value.trim();
      if (!message) return;

      chatBusy = true;
      input.value = '';
      document.getElementById('chatSendBtn').disabled = true;

      // Show user message
      appendChatMsg('user', message);

      // Show thinking indicator
      const thinkDiv = document.createElement('div');
      thinkDiv.className = 'chat-msg thinking';
      thinkDiv.textContent = '🤔 思考中…';
      document.getElementById('chatMessages').appendChild(thinkDiv);
      scrollChat();

      try {
        // Send chat request
        await fetch(`${API}/games/${currentChatId}/chat`, {
          method: 'POST',
          headers: {'Content-Type': 'application/json'},
          body: JSON.stringify({message}),
        });

        // Listen for SSE events
        listenChatEvents(currentChatId, thinkDiv);
      } catch (e) {
        thinkDiv.textContent = '❌ 发送失败: ' + e.message;
        thinkDiv.classList.remove('thinking');
        chatBusy = false;
        document.getElementById('chatSendBtn').disabled = false;
      }
    }

    function listenChatEvents(projectId, thinkDiv) {
      const es = new EventSource(`${API}/games/${projectId}/events`);
      es.onmessage = (evt) => {
        const data = JSON.parse(evt.data);

        // Update thinking indicator with progress
        if (data.file) {
          thinkDiv.textContent = `⚙️ 更新文件: ${data.file} (${data.done}/${data.total})`;
        } else if (data.status && !data.done) {
          const labels = {
            planning: '🤔 分析需求…',
            generating: '⚙️ 生成代码…',
            testing: '🧪 构建测试…',
            fixing: '🔧 修复问题…',
          };
          thinkDiv.textContent = labels[data.status] || data.message || '⏳ 处理中…';
        }

        if (data.done) {
          es.close();
          // Remove thinking indicator
          thinkDiv.remove();

          if (data.reply) {
            appendChatMsg('assistant', data.reply, data.changed_files);
          } else if (data.error) {
            appendChatMsg('assistant', '❌ 出错了: ' + data.error);
          } else {
            appendChatMsg('assistant', '✅ 处理完成');
          }

          chatBusy = false;
          document.getElementById('chatSendBtn').disabled = false;
          loadProjects();
        }
      };
      es.onerror = () => {
        es.close();
        thinkDiv.remove();
        appendChatMsg('assistant', '⚠️ 连接中断，请重试');
        chatBusy = false;
        document.getElementById('chatSendBtn').disabled = false;
      };
    }

    // ── Plan viewer (real-time) ────────────────────────────
    let planPollTimer = null;

    async function viewPlan(id) {
      document.getElementById('planContent').innerHTML = '加载中…';
      document.getElementById('planOverlay').classList.add('active');
      fetchPlan(id);
      planPollTimer = setInterval(() => fetchPlan(id), 2000);
    }

    async function fetchPlan(id) {
      try {
        const res = await fetch(`${API}/games/${id}/plan`);
        if (res.ok) {
          const md = await res.text();
          const el = document.getElementById('planContent');
          const wasAtBottom = el.scrollHeight - el.scrollTop - el.clientHeight < 40;
          el.innerHTML = renderMarkdown(md);
          if (wasAtBottom) el.scrollTop = el.scrollHeight;
        } else {
          document.getElementById('planContent').innerHTML = '暂无方案（项目可能还未开始生成）';
        }
      } catch (e) {
        document.getElementById('planContent').innerHTML = '加载失败: ' + escHtml(e.message);
      }
    }

    function closePlanViewer() {
      document.getElementById('planOverlay').classList.remove('active');
      if (planPollTimer) { clearInterval(planPollTimer); planPollTimer = null; }
    }

    /** Minimal Markdown → HTML renderer (no external dependency). */
    function renderMarkdown(md) {
      let html = escHtml(md);
      // Headings
      html = html.replace(/^### (.+)$/gm, '<h3>$1</h3>');
      html = html.replace(/^## (.+)$/gm, '<h2>$1</h2>');
      html = html.replace(/^# (.+)$/gm, '<h1>$1</h1>');
      // HR
      html = html.replace(/^---$/gm, '<hr>');
      // Bold
      html = html.replace(/\*\*(.+?)\*\*/g, '<strong>$1</strong>');
      // Inline code
      html = html.replace(/`([^`]+)`/g, '<code>$1</code>');
      // Blockquote
      html = html.replace(/^&gt; (.+)$/gm, '<blockquote>$1</blockquote>');
      // Checkbox lists
      html = html.replace(/^- \[x\] (.+)$/gm, '<li style="list-style:none;">✅ $1</li>');
      html = html.replace(/^- \[ \] (.+)$/gm, '<li style="list-style:none;">⬜ $1</li>');
      // Unordered list items
      html = html.replace(/^- (.+)$/gm, '<li>$1</li>');
      // Tables: header row
      html = html.replace(/^\|(.+)\|$/gm, (match) => {
        const cells = match.slice(1, -1).split('|').map(c => c.trim());
        if (cells.every(c => /^[-:]+$/.test(c))) return ''; // separator row
        const tag = 'td';
        return '<tr>' + cells.map(c => `<${tag}>${c}</${tag}>`).join('') + '</tr>';
      });
      // Wrap consecutive <tr> in <table>
      html = html.replace(/((?:<tr>.*<\/tr>\n?)+)/g, '<table>$1</table>');
      // Code blocks
      html = html.replace(/```[\w]*\n([\s\S]*?)```/g, '<pre><code>$1</code></pre>');
      // Paragraphs: convert double newlines
      html = html.replace(/\n\n/g, '</p><p>');
      html = '<p>' + html + '</p>';
      // Cleanup empty paragraphs
      html = html.replace(/<p><\/p>/g, '');
      html = html.replace(/<p>(<h[123]>)/g, '$1');
      html = html.replace(/(<\/h[123]>)<\/p>/g, '$1');
      html = html.replace(/<p>(<hr>)<\/p>/g, '$1');
      html = html.replace(/<p>(<table>)/g, '$1');
      html = html.replace(/(<\/table>)<\/p>/g, '$1');
      html = html.replace(/<p>(<li)/g, '<ul><li');
      html = html.replace(/(<\/li>)<\/p>/g, '</li></ul>');
      html = html.replace(/<p>(<blockquote>)/g, '$1');
      html = html.replace(/(<\/blockquote>)<\/p>/g, '$1');
      html = html.replace(/<p>(<pre>)/g, '$1');
      html = html.replace(/(<\/pre>)<\/p>/g, '$1');
      return html;
    }

    // ── Log viewer (real-time) ─────────────────────────────
    let logPollTimer = null;

    async function viewLogs(id) {
      document.getElementById('logContent').textContent = '加载中…';
      document.getElementById('logOverlay').classList.add('active');
      // Start real-time polling
      fetchLog(id);
      logPollTimer = setInterval(() => fetchLog(id), 2000);
    }

    async function fetchLog(id) {
      try {
        const res = await fetch(`${API}/games/${id}/logs`);
        if (res.ok) {
          const text = await res.text();
          const el = document.getElementById('logContent');
          const wasAtBottom = el.scrollHeight - el.scrollTop - el.clientHeight < 40;
          el.textContent = text || '（日志为空）';
          if (wasAtBottom) el.scrollTop = el.scrollHeight;
        } else {
          document.getElementById('logContent').textContent = '暂无日志（项目可能还未运行过流水线）';
        }
      } catch (e) {
        document.getElementById('logContent').textContent = '加载失败: ' + e.message;
      }
    }

    function closeLogViewer() {
      document.getElementById('logOverlay').classList.remove('active');
      if (logPollTimer) { clearInterval(logPollTimer); logPollTimer = null; }
    }

    // ── Helpers ───────────────────────────────────────────
    function statusLabel(s) {
      const map = {analyzing:'分析中',planning:'规划中',generating:'生成中',building:'构建中',testing:'测试中',fixing:'修复中',ready:'已就绪',failed:'失败'};
      return map[s] || s;
    }
    function timeAgo(ts) {
      const diff = (Date.now() / 1000 - ts);
      if (diff < 60) return '刚刚';
      if (diff < 3600) return Math.floor(diff/60) + ' 分钟前';
      if (diff < 86400) return Math.floor(diff/3600) + ' 小时前';
      return Math.floor(diff/86400) + ' 天前';
    }
    function escHtml(s) {
      const d = document.createElement('div');
      d.textContent = s;
      return d.innerHTML;
    }

    // ── Init ──────────────────────────────────────────────
    loadProjects();
    setInterval(loadProjects, 10000);
  </script>
</body>
</html>
